rules:
  - id: securelens.js.sql-string-concat
    message: Potential SQL injection: query built with string concatenation.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      shortDescription: This query appears to be built with string concatenation.
    patterns:
      - pattern-either:
          - pattern: $DB.query("..." + ...)
          - pattern: $DB.query(`...${...}...`)
          - pattern: $DB.execute("..." + ...)
          - pattern: $SQL = "..." + ...
          - pattern: $SQL = `...${...}...`
          - pattern: const $SQL = "..." + ...
          - pattern: const $SQL = `...${...}...`
          - pattern: let $SQL = "..." + ...
          - pattern: let $SQL = `...${...}...`
          - pattern: var $SQL = "..." + ...
          - pattern: var $SQL = `...${...}...`

  - id: securelens.js.dangerous-innerhtml
    message: Potential XSS: innerHTML used with dynamic content.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      shortDescription: This code inserts dynamic content with innerHTML.
    patterns:
      - pattern-either:
          - pattern: $EL.innerHTML = $VALUE
          - pattern: document.$METHOD(...).innerHTML = $VALUE

  - id: securelens.js.exec-user-input
    message: Potential command injection or unsafe process execution.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      shortDescription: This code may execute a shell command built from dynamic input.
    pattern: exec($CMD)

  - id: securelens.js.eval-usage
    message: Dynamic code execution detected.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      shortDescription: This code uses dynamic evaluation.
    pattern: eval($CODE)

  - id: securelens.js.hardcoded-password
    message: Possible hardcoded secret detected. Move this value to an environment variable.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      shortDescription: This value looks like a hardcoded secret.
    pattern-regex: (?i)(password|passwd|api[_-]?key|secret)\s*[:=]\s*["'][^"']{6,}["']

  - id: securelens.py.sql-string-concat
    message: Potential SQL injection: query built with string concatenation.
    severity: WARNING
    languages: [python]
    metadata:
      shortDescription: This query appears to be built with string concatenation.
    patterns:
      - pattern-either:
          - pattern: $CURSOR.execute("..." + ...)
          - pattern: $CURSOR.execute(f"...{...}...")

  - id: securelens.py.yaml-unsafe-load
    message: Avoid yaml.load with an unsafe loader.
    severity: ERROR
    languages: [python]
    metadata:
      shortDescription: Unsafe YAML loading can instantiate attacker-controlled objects.
    patterns:
      - pattern-either:
          - pattern: yaml.load($DATA, Loader=yaml.Loader)
          - pattern: yaml.load($DATA, Loader=yaml.FullLoader)

  - id: securelens.py.pickle-loads
    message: Avoid deserializing untrusted data with pickle.loads.
    severity: ERROR
    languages: [python]
    metadata:
      shortDescription: pickle can execute arbitrary code during deserialization.
    pattern: pickle.loads($DATA)
